# 质检报告自动推送 - GitHub Actions
# 统一调度：日报 + 周报 + 新人日报
# 
# 调度策略：
#   - 日报 + 新人日报：每天 UTC 10:20 (北京 18:20)
#   - 周报：每周五 UTC 10:30 (北京 18:30)
#   - 手动触发：支持选择报告类型

name: QA Report Pipeline

on:
  schedule:
    # 日报 + 新人日报：北京时间 18:20（工作日+周末均推送）
    - cron: '20 10 * * *'
    # 周报：每周五北京时间 18:30
    - cron: '30 10 * * 5'
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        type: choice
        options:
          - daily
          - weekly
          - newcomer
          - all
        default: 'all'
      report_date:
        description: '报告日期 (YYYY-MM-DD)，留空=自动'
        required: false
        default: ''
      dry_run:
        description: '仅生成不推送'
        required: false
        type: boolean
        default: false
      skip_ai:
        description: '跳过 AI 洞察'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: qa-report-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.12'

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Prepare config
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK_URL }}
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_URL: ${{ secrets.DEEPSEEK_API_URL }}
        run: |
          mkdir -p config

          python << 'PYEOF'
          import json, os, sys

          required = {
              "TIDB_HOST": os.environ.get("TIDB_HOST", ""),
              "TIDB_USER": os.environ.get("TIDB_USER", ""),
              "TIDB_PASSWORD": os.environ.get("TIDB_PASSWORD", ""),
              "TIDB_DATABASE": os.environ.get("TIDB_DATABASE", ""),
              "WECOM_WEBHOOK": os.environ.get("WECOM_WEBHOOK", ""),
          }
          missing = [k for k, v in required.items() if not v]
          if missing:
              print(f"::warning::Secrets 未配置: {', '.join(missing)}")
              open("config/.skip_flag", "w").write("secrets_missing")
              sys.exit(0)

          config = {
              "wecom_webhook_url": required["WECOM_WEBHOOK"],
              "dashboard_url": "https://quality-dashboard-2026.streamlit.app/",
              "deepseek": {
                  "api_key": os.environ.get("DEEPSEEK_KEY", ""),
                  "api_url": os.environ.get("DEEPSEEK_URL", "https://api.deepseek.com/v1/chat/completions"),
                  "model": "deepseek-reasoner"
              },
              "tidb": {
                  "host": required["TIDB_HOST"],
                  "port": int(os.environ.get("TIDB_PORT", "4000")),
                  "user": required["TIDB_USER"],
                  "password": required["TIDB_PASSWORD"],
                  "database": required["TIDB_DATABASE"],
                  "charset": "utf8mb4"
              }
          }
          with open("config/settings.json", "w") as f:
              json.dump(config, f, indent=2)
          print("✅ Config prepared")
          PYEOF

      # ── 判断执行哪些报告 ──
      - name: Determine report types
        if: hashFiles('config/.skip_flag') == ''
        id: plan
        run: |
          EVENT="${{ github.event_name }}"
          
          if [ "$EVENT" = "workflow_dispatch" ]; then
            TYPE="${{ github.event.inputs.report_type }}"
            echo "run_daily=$( [ "$TYPE" = "daily" ] || [ "$TYPE" = "all" ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "run_weekly=$( [ "$TYPE" = "weekly" ] || [ "$TYPE" = "all" ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "run_newcomer=$( [ "$TYPE" = "newcomer" ] || [ "$TYPE" = "all" ] && echo true || echo false )" >> $GITHUB_OUTPUT
          else
            # schedule 触发
            CRON="${{ github.event.schedule }}"
            if [ "$CRON" = "30 10 * * 5" ]; then
              # 周五周报
              echo "run_daily=true" >> $GITHUB_OUTPUT
              echo "run_weekly=true" >> $GITHUB_OUTPUT
              echo "run_newcomer=true" >> $GITHUB_OUTPUT
            else
              # 日报 + 新人日报
              echo "run_daily=true" >> $GITHUB_OUTPUT
              echo "run_weekly=false" >> $GITHUB_OUTPUT
              echo "run_newcomer=true" >> $GITHUB_OUTPUT
            fi
          fi

      # ── 刷新数仓 + 告警（报告依赖最新聚合数据）──
      - name: Refresh warehouse & alerts
        if: hashFiles('config/.skip_flag') == ''
        run: |
          # 只刷新昨天和今天的数据，避免全量扫描耗尽 RU 配额
          TARGET_DATE=$(date -u -d '-1 day' '+%Y-%m-%d')
          echo "🔄 Refreshing warehouse for recent 2 days..."
          python jobs/refresh_warehouse.py --recent-days 2 || echo "::warning::数仓刷新失败，使用现有数据"
          echo "🔔 Refreshing alerts (lookback 7 days)..."
          python jobs/refresh_alerts.py --lookback-days 7 || echo "::warning::告警刷新失败，使用现有数据"

      # ── 日报 ──
      - name: Daily report
        if: hashFiles('config/.skip_flag') == '' && steps.plan.outputs.run_daily == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL: ${{ secrets.DEEPSEEK_API_URL }}
        run: |
          ARGS="--force"
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.report_date }}"
          else
            ARGS="$ARGS --date $(date -u -d '-1 day' '+%Y-%m-%d')"
          fi
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ github.event.inputs.skip_ai }}" = "true" ] && ARGS="$ARGS --skip-ai"
          
          echo "📊 Running: python jobs/daily_report.py $ARGS"
          python jobs/daily_report.py $ARGS

      # ── 新人日报 ──
      - name: Newcomer daily report
        if: hashFiles('config/.skip_flag') == '' && steps.plan.outputs.run_newcomer == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL: ${{ secrets.DEEPSEEK_API_URL }}
        run: |
          ARGS="--force"
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.report_date }}"
          else
            ARGS="$ARGS --date $(date -u -d '-1 day' '+%Y-%m-%d')"
          fi
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ github.event.inputs.skip_ai }}" = "true" ] && ARGS="$ARGS --skip-ai"
          
          echo "👶 Running: python jobs/newcomer_daily_report.py $ARGS"
          python jobs/newcomer_daily_report.py $ARGS

      # ── 周报（仅周五或手动选择）──
      - name: Weekly report
        if: hashFiles('config/.skip_flag') == '' && steps.plan.outputs.run_weekly == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL: ${{ secrets.DEEPSEEK_API_URL }}
        run: |
          ARGS="--force"
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.report_date }}"
          else
            ARGS="$ARGS --date $(date -u '+%Y-%m-%d')"
          fi
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ github.event.inputs.skip_ai }}" = "true" ] && ARGS="$ARGS --skip-ai"
          
          echo "📈 Running: python jobs/weekly_report.py $ARGS"
          python jobs/weekly_report.py $ARGS

      # ── 自动清理（超过45天的数据直接删除）──
      - name: Auto prune old data
        if: hashFiles('config/.skip_flag') == ''
        run: |
          echo "🧹 Pruning data older than 45 days..."
          python jobs/auto_maintenance.py --prune --days 45 || echo "::warning::数据清理失败"

      # ── 健康检查（异常时推送企微）──
      - name: Health check & push
        if: hashFiles('config/.skip_flag') == ''
        run: |
          echo "🩺 Running health check..."
          python jobs/auto_maintenance.py --health --push || echo "::warning::健康检查失败"

      # ── 跳过通知 ──
      - name: Skip notice
        if: hashFiles('config/.skip_flag') != ''
        run: |
          echo "::notice::⏭️ 报告已跳过 — Secrets 未配置"
          echo "请在 Settings → Secrets 中配置: TIDB_HOST, TIDB_PORT, TIDB_USER, TIDB_PASSWORD, TIDB_DATABASE, WECOM_WEBHOOK_URL, DEEPSEEK_API_KEY" >> $GITHUB_STEP_SUMMARY

      # ── 保存产物 ──
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ github.run_number }}
          path: |
            deliverables/
            daily_data.json
          if-no-files-found: warn
          retention-days: 30
