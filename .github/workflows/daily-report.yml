# 质检日报推送 - GitHub Action
# ⚠️ 默认关闭自动调度（与本地 LaunchAgents daily_refresh 重复）
#    本地 13:05 已覆盖数据刷新+企微推送，此 workflow 仅作备用/手动触发
#    如需启用自动调度，取消下方 schedule 注释即可

name: Daily QA Report

on:
  # schedule:
  #   # UTC 10:20 = 北京时间 18:20（每天）
  #   - cron: '20 10 * * *'
  workflow_dispatch:
    # 允许手动触发（用于测试或应急推送）
    inputs:
      report_date:
        description: '报告日期 (YYYY-MM-DD)，默认昨天'
        required: false
        default: ''
      dry_run:
        description: '仅生成不推送'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: daily-qa-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare config
        env:
          TIDB_HOST: ${{ secrets.TIDB_HOST }}
          TIDB_PORT: ${{ secrets.TIDB_PORT }}
          TIDB_USER: ${{ secrets.TIDB_USER }}
          TIDB_PASSWORD: ${{ secrets.TIDB_PASSWORD }}
          TIDB_DATABASE: ${{ secrets.TIDB_DATABASE }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK_URL }}
        run: |
          # 直接生成完整的 settings.json，代码从该文件读取所有配置
          mkdir -p config

          # 生成 settings.json
          python << 'PYEOF'
          import json, os, sys

          required = {
              "TIDB_HOST": os.environ.get("TIDB_HOST", ""),
              "TIDB_USER": os.environ.get("TIDB_USER", ""),
              "TIDB_PASSWORD": os.environ.get("TIDB_PASSWORD", ""),
              "TIDB_DATABASE": os.environ.get("TIDB_DATABASE", ""),
              "WECOM_WEBHOOK": os.environ.get("WECOM_WEBHOOK", ""),
          }
          missing = [name for name, value in required.items() if not value]

          if missing:
              print(f"⚠️ Secrets 未配置（{', '.join(missing)}），跳过配置生成。")
              print("   → 如需启用此 workflow，请在 Settings → Secrets 中配置以下变量：")
              print("     TIDB_HOST, TIDB_PORT, TIDB_USER, TIDB_PASSWORD, TIDB_DATABASE, WECOM_WEBHOOK_URL")
              print("   → 或使用本地 LaunchAgents daily_refresh (每天 13:05) 已覆盖此功能")
              # 写一个标记文件，让后续步骤知道配置未就绪
              with open("config/.skip_flag", "w") as f:
                  f.write("secrets_missing")
              sys.exit(0)

          config = {
              "wecom_webhook_url": required["WECOM_WEBHOOK"],
              "wecom_webhook_key": "",
              "daily_report_hour": 18,
              "daily_report_minute": 20,
              "dashboard_url": "https://quality-dashboard-2026.streamlit.app/",
              "db_path": "data/warehouse/qa.duckdb",
              "tidb": {
                  "host": required["TIDB_HOST"],
                  "port": int(os.environ.get("TIDB_PORT", "4000")),
                  "user": required["TIDB_USER"],
                  "password": required["TIDB_PASSWORD"],
                  "database": required["TIDB_DATABASE"],
                  "charset": "utf8mb4"
              }
          }

          with open("config/settings.json", "w", encoding="utf-8") as f:
              json.dump(config, f, indent=2)

          print("Config prepared (secrets omitted).")
          PYEOF

      - name: Run daily report
        if: hashFiles('config/.skip_flag') == ''
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_URL: ${{ secrets.DEEPSEEK_API_URL }}
        run: |
          ARGS=""
          
          # 计算日期参数
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            ARGS="--date ${{ github.event.inputs.report_date }}"
          else
            ARGS="--date $(date -d 'yesterday' '+%Y-%m-%d')"
          fi
          
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          
          echo "Running: python jobs/daily_report.py $ARGS"
          python jobs/daily_report.py $ARGS

      - name: Skip notice
        if: hashFiles('config/.skip_flag') != ''
        run: |
          echo "::notice::⏭️ Daily QA Report 已跳过 — Secrets 未配置"
          echo "::notice::   本地 LaunchAgents daily_refresh (13:05) 已覆盖此功能"
          echo "::notice::   如需启用云端推送，请配置 Repository Secrets 后手动触发"
          echo "SKIP=true" >> $GITHUB_STEP_SUMMARY

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: daily-report-${{ github.run_number }}
          path: |
            deliverables/
            daily_data.json
          if-no-files-found: warn
          retention-days: 30
