# ============================================================
# Fluentd 配置文件
# ============================================================
# 功能：
#   1. 监听文件日志（logs/*.log）
#   2. 解析日志格式（JSON / Python logging）
#   3. 转发到 Elasticsearch
# ============================================================

# 输入：监听应用日志文件
<source>
  @type tail
  path /logs/api.access.log
  pos_file /fluentd/log/api.access.log.pos
  tag qc.api.access
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%d %H:%M:%S
  </parse>
</source>

<source>
  @type tail
  path /logs/api.error.log
  pos_file /fluentd/log/api.error.log.pos
  tag qc.api.error
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%d %H:%M:%S
  </parse>
</source>

<source>
  @type tail
  path /logs/frontend.log
  pos_file /fluentd/log/frontend.log.pos
  tag qc.frontend
  <parse>
    @type json
    time_key timestamp
    time_format %Y-%m-%d %H:%M:%S,%f
  </parse>
</source>

<source>
  @type tail
  path /logs/monitor.*.log
  pos_file /fluentd/log/monitor.log.pos
  tag qc.monitor
  <parse>
    @type json
    time_key timestamp
  </parse>
</source>

# 过滤：添加通用字段
<filter qc.**>
  @type record_transformer
  <record>
    env ${ENV:-production}
    service qc-dashboard
    hostname "#{Socket.gethostname}"
  </record>
</filter>

# 输出：转发到 Elasticsearch
<match qc.**>
  @type elasticsearch
  host elasticsearch
  port 9200
  index_name qc-logs
  type_name _doc
  
  # 缓冲配置
  <buffer>
    @type file
    path /fluentd/log/buffer
    flush_interval 5s
    retry_max_times 3
    chunk_limit_size 5M
  </buffer>
  
  # 失败重试
  <secondary>
    @type file
    path /fluentd/log/failed
  </secondary>
</match>

# 调试：输出到标准输出（可选）
# <match qc.**>
#   @type stdout
# </match>
