# Prometheus 配置文件

global:
  scrape_interval: 15s  # 抓取间隔
  evaluation_interval: 15s  # 规则评估间隔
  external_labels:
    cluster: 'qc-dashboard'
    env: 'production'

# 告警规则文件（可选）
rule_files:
  # - "alerts.yml"

# 抓取配置
scrape_configs:
  # Prometheus 自身指标
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI 应用指标（需要在应用中暴露 /metrics 端点）
  - job_name: 'qc-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # cAdvisor 容器指标
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Node Exporter 主机指标
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # TiDB 指标（如果 TiDB 暴露了 Prometheus 端点）
  # - job_name: 'tidb'
  #   static_configs:
  #     - targets: ['tidb-host:10080']
